sudo: required
git:
  clone: false
language: python
python:
- '3.6'
before_install:
- curl -L https://cpanmin.us | sudo perl - --sudo App::cpanminus
- sudo cpanm --notest DBI
- sudo cpanm --notest DBD::Pg
- echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
- docker pull busybox
- docker pull flybase/proformatestdb
- docker pull flybase/harvdev-docker
script:
- export BRANCH=$(if [ "$TRAVIS_PULL_REQUEST" == "false" ]; then echo $TRAVIS_BRANCH;
  else echo $TRAVIS_PULL_REQUEST_BRANCH; fi)
- echo "TRAVIS_BRANCH=$TRAVIS_BRANCH, PR=$PR, BRANCH=$BRANCH"
- git clone https://$GIT_USER:$GIT_PASS@github.com:FlyBase/harvdev-proforma-setup.git
- cd harvdev-proforma-setup
- "./build_test_travis_perl.sh"
- pip3 install -r requirements.txt
- python3 ./test_scripts/run_tests.py
env:
  global:
  - secure: 
  - secure: 
  - secure: 
  - secure: 
